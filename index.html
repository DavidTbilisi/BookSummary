<!DOCTYPE html>
<html lang="ka">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>წიგნების შეჯამების პროექტი</title>
    <link rel="stylesheet" href="assets/css/main.css">
  </head>
  <body>
    <div class="page-shell">
      <div class="app-container">
        <header class="site-header">
          <div class="header-pill"><a class="logo" href="index.html">წიგნების შეჯამების პროექტი</a>
            <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme"><span class="theme-icon">🌙</span></button>
          </div>
        </header>
        <div class="search-section">
          <p class="search-tagline">მოკლე შეჯამებები გავლენიანი წიგნებიდან — მთავარი იდეები, პრაქტიკული დასკვნები</p>
          <div class="search-wrap">
            <input class="search-input" id="search" type="search" placeholder="ძებნა: სათაური ან ავტორი …">
            <div class="search-icon">🔍</div><span class="search-kbd">Ctrl K</span>
          </div>
        </div>
        <div class="genre-section">
          <div class="genre-pills">
            <button class="genre-pill genre-pill--all active" data-genre="all">ყველა</button>
            <button class="genre-pill" data-genre="productivity">პროდუქტიულობა</button>
            <button class="genre-pill" data-genre="learning">სწავლა</button>
            <button class="genre-pill" data-genre="thinking">აზროვნება</button>
            <button class="genre-pill" data-genre="psychology">ფსიქოლოგია</button>
            <button class="genre-pill" data-genre="finance">ფინანსები</button>
            <button class="genre-pill" data-genre="general">ზოგადი</button>
          </div>
        </div>
        <div class="stats-bar">
          <div class="stat-item">
            <div class="stat-value" id="statTotal">0</div>
            <div class="stat-label">წიგნების რაოდენობა</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-value stat-value--reading" id="statReading">0</div>
            <div class="stat-label">წიგნი მიმდინარეობაში</div>
          </div>
          <div class="stat-divider"></div>
          <div class="stat-item">
            <div class="stat-value stat-value--done" id="statFinished">0</div>
            <div class="stat-label">დასრულებული</div>
          </div>
          <div class="stat-item--progress">
            <div class="stat-label" id="statPct">0% დასრულებული</div>
            <div class="stat-bar" id="statBar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
              <div class="stat-bar-fill" id="statBarFill" style="width:0%"></div>
            </div>
          </div>
        </div>
        <section class="books-section">
          <div class="books-grid" id="bookGrid"></div>
          <div class="empty-msg hidden" id="emptyMsg">არაფერი წიგნები არ მოიძებნა</div>
        </section>
        <template id="book-card-tpl">
          <article class="book-card" tabindex="0">
            <div class="card-cover-wrap"><img class="card-cover" data-el="cover" src="" alt="">
              <div class="card-status-dot" data-el="dot" data-status="unread" aria-hidden="true"></div>
            </div>
            <div class="card-body"><span class="card-genre-tag" data-el="genre"></span>
              <h3 class="card-title" data-el="title"></h3>
              <p class="card-author" data-el="author"></p>
              <div class="card-prog-bar">
                <div class="card-prog-fill" data-el="progFill" style="width:0%"></div>
              </div>
              <div class="card-actions"><a class="btn-summary" data-el="summaryLink" href="#" target="_blank">შეჯამების წაკითხვა</a>
                <button class="btn-secondary sr-only" type="button" data-el="moreBtn">დეტალები</button>
              </div>
            </div>
          </article>
        </template>
        <div class="modal-overlay hidden" id="modal" role="dialog" aria-modal="true">
          <div class="modal-panel">
            <button class="modal-close" id="modalClose" aria-label="Close">×</button>
            <div class="modal-hero"><img class="modal-cover" id="modalCover" src="" alt="">
              <div class="modal-hero-overlay"></div>
            </div>
            <div class="modal-body"><span class="modal-genre" id="modalGenre"></span>
              <h3 class="modal-title" id="modalTitle"></h3>
              <p class="modal-author" id="modalAuthor"></p>
              <p class="modal-desc" id="modalDesc"></p>
              <div class="prog-tracker">
                <div class="prog-tracker-label">იმის სტატუსი</div>
                <div class="prog-btns">
                  <button class="prog-btn" data-status="unread">არ წაკითხული</button>
                  <button class="prog-btn" data-status="reading">წაკითხვის პროცესში</button>
                  <button class="prog-btn" data-status="finished">დასრულებული</button>
                </div>
              </div>
              <div class="modal-actions"><a class="btn-primary" id="modalSummary" href="#" target="_blank">შეჯამების წაკითხვა</a><a class="btn-secondary" id="modalBook" href="#" target="_blank">წიგნი</a></div>
            </div>
          </div>
        </div>
        <footer class="site-footer">
          <p>© <span id='year'></span> წიგნების შეჯამების პროექტი</p>
        </footer>
      </div>
    </div>
    <script src="assets/js/app.js" defer></script>
  </body>
</html>
